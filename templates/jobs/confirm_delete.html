{% extends 'base.html' %}
{% block title %}Удалить вакансию{% endblock %}
{% block content %}
<div class="page">
  <div class="container-sm">
    <div class="card text-center" style="max-width:440px;margin:2rem auto;padding:2.5rem;">
      <div style="font-size:3rem;margin-bottom:1rem;">🗑️</div>
      <h1 class="page-title" style="font-size:1.4rem;">Удалить вакансию?</h1>
      <p class="text-muted mt-1 mb-2">«{{ vacancy.title }}» будет удалена безвозвратно вместе со всеми откликами.</p>
      <div class="flex gap-2" style="justify-content:center;">
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger btn-lg">Удалить</button>
        </form>
        <a href="{% url 'vacancy_detail' vacancy.pk %}" class="btn btn-ghost btn-lg">Отмена</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
